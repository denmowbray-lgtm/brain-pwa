<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>dmowbray.us</title>
<meta name="description" content="Personal infrastructure core — self-hosted home automation and operational tooling on owned hardware.">
<meta name="theme-color" content="#0a0e14">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root{
    --bg:#0a0e14;
    --core:#4fc3f7;
    --core-hot:#dffaff;
    --online:#3fb950;
    --pending:#f0a500;
    --ink:#cdd9e5;
    --muted:#8b98ad;
    --line:#1e2d3d;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{
    font-family:'IBM Plex Sans',sans-serif;
    color:var(--ink);
    position:fixed;inset:0;
    touch-action:none;
  }
  canvas{display:block;position:absolute;inset:0;width:100%;height:100%;}

  /* faint engineering grid behind everything */
  .grid{
    position:absolute;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(rgba(79,195,247,0.035) 1px,transparent 1px),
      linear-gradient(90deg,rgba(79,195,247,0.035) 1px,transparent 1px);
    background-size:46px 46px;
    mask-image:radial-gradient(circle at 50% 50%,transparent 30%,#000 90%);
    -webkit-mask-image:radial-gradient(circle at 50% 50%,transparent 30%,#000 90%);
  }

  /* ---- init gate ---- */
  #gate{
    position:absolute;inset:0;z-index:30;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;cursor:pointer;
    background:radial-gradient(circle at 50% 50%,rgba(10,14,20,0.4),var(--bg) 70%);
    transition:opacity .8s ease;
  }
  #gate .mark{
    font-family:'IBM Plex Mono',monospace;font-weight:600;
    font-size:13px;letter-spacing:.42em;color:var(--core);
    text-transform:uppercase;opacity:.9;
  }
  #gate .pulse{
    width:88px;height:88px;border-radius:50%;
    border:1px solid rgba(79,195,247,.5);
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  #gate .pulse::before{
    content:'';position:absolute;inset:-1px;border-radius:50%;
    border:1px solid var(--core);
    animation:ring 2.4s ease-out infinite;
  }
  #gate .pulse .dot{width:10px;height:10px;border-radius:50%;background:var(--core);box-shadow:0 0 18px var(--core);}
  @keyframes ring{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.1);opacity:0}}
  #gate .cta{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;}
  #gate.hide{opacity:0;pointer-events:none;}

  /* ---- HUD ---- */
  #hud{position:absolute;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity 1s ease .2s;}
  #hud.show{opacity:1;}
  .top{
    position:absolute;top:max(18px,env(safe-area-inset-top));left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:0 max(18px,env(safe-area-inset-left)) 0 max(18px,env(safe-area-inset-right));
    font-family:'IBM Plex Mono',monospace;
  }
  .domain{font-size:12px;letter-spacing:.22em;color:var(--core);text-transform:uppercase;}
  .clock{font-size:12px;letter-spacing:.12em;color:var(--muted);text-align:right;}
  .clock b{color:var(--ink);font-weight:500;}

  .greet{
    position:absolute;left:0;right:0;top:calc(max(18px,env(safe-area-inset-top)) + 30px);
    text-align:center;font-weight:300;font-size:15px;color:var(--muted);
    letter-spacing:.02em;padding:0 24px;min-height:20px;
    transition:opacity .6s ease;
  }
  .greet b{color:var(--ink);font-weight:400;}

  /* ---- voice console (bottom) ---- */
  #console{
    position:absolute;left:0;right:0;bottom:max(20px,env(safe-area-inset-bottom));
    z-index:22;display:flex;flex-direction:column;align-items:center;gap:14px;
    pointer-events:none;opacity:0;transition:opacity 1s ease .4s;
  }
  #console.show{opacity:1;}
  .transcript{
    max-width:min(680px,90vw);width:max-content;
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.55;
    text-align:center;color:var(--muted);min-height:18px;padding:0 18px;
    transition:opacity .3s ease;
  }
  .transcript .you{color:var(--core);}
  .transcript .jarvis{color:var(--ink);}
  .mic{
    pointer-events:auto;cursor:pointer;
    width:60px;height:60px;border-radius:50%;
    background:rgba(17,23,32,.72);border:1px solid var(--line);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    transition:border-color .2s,box-shadow .2s,transform .1s;
  }
  .mic:active{transform:scale(.94);}
  .mic svg{width:24px;height:24px;}
  .mic.listening{border-color:var(--core);box-shadow:0 0 0 1px var(--core),0 0 26px rgba(79,195,247,.5);}
  .mic.listening svg{stroke:var(--core);}
  .mic.busy{border-color:var(--pending);}
  .hint{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;opacity:.7;}

  /* ---- PIN entry ---- */
  #pinwrap{
    pointer-events:auto;display:none;flex-direction:column;align-items:center;gap:10px;
  }
  #pinwrap.show{display:flex;}
  #pin{
    width:160px;text-align:center;letter-spacing:.5em;
    font-family:'IBM Plex Mono',monospace;font-size:18px;
    background:rgba(17,23,32,.8);border:1px solid var(--line);border-radius:6px;
    color:var(--ink);padding:11px 8px;outline:none;
  }
  #pin:focus{border-color:var(--core);}
  #pinwrap .hint{cursor:default;}

  @media (prefers-reduced-motion:reduce){
    #gate .pulse::before{animation:none;}
  }
</style>
</head>
<body>
<div class="grid"></div>
<canvas id="scene"></canvas>

<div id="gate">
  <div class="mark">dmowbray.us</div>
  <div class="pulse"><div class="dot"></div></div>
  <div class="cta">tap to initialize</div>
</div>

<div id="hud">
  <div class="top">
    <div class="domain">DMOWBRAY&nbsp;//&nbsp;CORE</div>
    <div class="clock"><b id="t-time">--:--</b><br><span id="t-date">—</span></div>
  </div>
  <div class="greet" id="greet"></div>
</div>

<div id="console">
  <div class="transcript" id="transcript"></div>
  <div id="pinwrap">
    <input id="pin" inputmode="numeric" autocomplete="off" placeholder="••••••" maxlength="10">
    <div class="hint">enter pin to speak to jarvis</div>
  </div>
  <div class="mic" id="mic" title="Hold a thought — tap to speak">
    <svg viewBox="0 0 24 24" fill="none" stroke="#8b98ad" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="11" rx="3"></rect>
      <path d="M5 11a7 7 0 0 0 14 0"></path>
      <line x1="12" y1="18" x2="12" y2="22"></line>
    </svg>
  </div>
  <div class="hint" id="michint">tap to speak</div>
</div>

<script>
"use strict";
/* ============================================================
   THE CORE v3 — dmowbray.us apex
   Rebuild to approved spec. Voice loop -> JARVIS (/webhook/jarvis).
   Self-contained, no build step, no external deps (fonts only).
   ============================================================ */

/* ---------- config ---------- */
var JARVIS_URL = "https://n8n.dmowbray.us/webhook/jarvis";
var PIN = new URLSearchParams(location.search).get("k") || "";   // never hardcoded; supply via ?k=
var SESSION = "apex-" + Math.random().toString(36).slice(2, 9);

var PODS = [
  { id:"sitteam", label:"SIT TEAM", go:"https://sitteam.dmowbray.us", live:true,  say:"Opening Sit Team." },
  { id:"brain",   label:"BRAIN",    go:"https://brain.dmowbray.us",   live:true,  say:"Opening the Brain." },
  { id:"n8n",     label:"n8n",      go:"https://n8n.dmowbray.us",     live:true,  say:"Opening n8n." },
  { id:"jarvis",  label:"JARVIS",   go:"https://n8n.dmowbray.us/webhook/jarvis-ui", live:true, say:"Opening Jarvis." },
  { id:"deck",   label:"DECK",     go:"https://dmowbray.us/deck",     live:true,  say:"Opening the Command Deck." },
  { id:"ha",      label:"HOME",     go:null, live:false, say:"Home Assistant isn't routed yet." },
  { id:"cam",     label:"CAMERAS",  go:null, live:false, say:"Cameras aren't routed yet." }
];

/* ---------- canvas ---------- */
var cv = document.getElementById("scene");
var ctx = cv.getContext("2d");
var W=0,H=0,CX=0,CY=0,DPR=1,R=180;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.floor(W*DPR); cv.height = Math.floor(H*DPR);
  cv.style.width = W+"px"; cv.style.height = H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  CX = W/2; CY = H/2;
  R = Math.max(120, Math.min(W,H) * 0.26);
}

/* ---------- particle core (620-pt fibonacci sphere) ---------- */
var N = 620;
var P = [];          // particles {sx,sy,sz home sphere unit; tx,ty text target; x,y,z current}
function buildSphere(){
  P.length = 0;
  var golden = Math.PI * (3 - Math.sqrt(5));
  for (var i=0;i<N;i++){
    var y = 1 - (i/(N-1))*2;
    var r = Math.sqrt(Math.max(0,1-y*y));
    var th = golden*i;
    P.push({
      sx:Math.cos(th)*r, sy:y, sz:Math.sin(th)*r,
      tx:0, ty:0, x:0, y:0, z:0
    });
  }
}

/* sample DMOWBRAY into a point cloud for the intro assemble */
function buildTextTargets(){
  var off = document.createElement("canvas");
  var ow = Math.min(W*0.92, 1100), oh = 240;
  off.width = ow; off.height = oh;
  var o = off.getContext("2d");
  o.fillStyle = "#000"; o.fillRect(0,0,ow,oh);
  o.fillStyle = "#fff";
  o.textAlign = "center"; o.textBaseline = "middle";
  var fs = Math.min(ow/7.2, 150);
  o.font = "600 "+fs+"px 'IBM Plex Mono', monospace";
  o.fillText("DMOWBRAY", ow/2, oh/2);
  var data = o.getImageData(0,0,ow,oh).data;
  var pts = [];
  var step = 4;
  for (var y=0;y<oh;y+=step){
    for (var x=0;x<ow;x+=step){
      if (data[(y*ow+x)*4] > 120) pts.push([x-ow/2, y-oh/2]);
    }
  }
  // shuffle for organic assembly
  for (var s=pts.length-1;s>0;s--){var j=(Math.random()*(s+1))|0;var tmp=pts[s];pts[s]=pts[j];pts[j]=tmp;}
  var scale = Math.min(1, (Math.min(W,H)*0.9)/ (oh*1.4));
  for (var k=0;k<N;k++){
    var p = pts.length ? pts[k % pts.length] : [0,0];
    P[k].tx = p[0]*scale;
    P[k].ty = p[1]*scale;
  }
}

/* dust + rings */
var DUST = [];
function buildDust(){
  DUST.length=0;
  for (var i=0;i<70;i++){
    DUST.push({a:Math.random()*Math.PI*2, rad:R*(1.3+Math.random()*1.5), sp:(Math.random()*0.0007+0.0002)*(Math.random()<.5?-1:1), z:Math.random(), s:Math.random()*1.4+0.4});
  }
}

/* ---------- rotation state ---------- */
var rotY=0, rotX=-0.35, velY=0.0016, velX=0;
var dragging=false, lastX=0, lastY=0, pdownX=0, pdownY=0, pmoved=false;
var gyroY=0, gyroX=0;

function project(x,y,z){
  // rotate Y then X
  var cy=Math.cos(rotY+gyroY), sy=Math.sin(rotY+gyroY);
  var x1=x*cy - z*sy, z1=x*sy + z*cy;
  var cx=Math.cos(rotX+gyroX), sx=Math.sin(rotX+gyroX);
  var y1=y*cx - z1*sx, z2=y*sx + z1*cx;
  var persp = 320/(320 - z2*R*0.9);
  return { px:CX + x1*R*persp, py:CY + y1*R*persp, depth:z2, sc:persp };
}

/* ---------- intro sequence ---------- */
var phase = "idle";   // idle -> text -> collapse -> live
var t0 = 0;
function startSequence(){
  phase="text"; t0=performance.now();
  charge();
  startHum();
}

/* ---------- audio (synth, no files) ---------- */
var AC=null, hum=null, humGain=null;
function audioInit(){
  if (AC) return;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
  }catch(e){ AC=null; }
}
function startHum(){
  if(!AC) return;
  try{
    hum = AC.createOscillator(); var h2=AC.createOscillator();
    humGain = AC.createGain();
    hum.type="sine"; hum.frequency.value=54;
    h2.type="sine"; h2.frequency.value=81;
    humGain.gain.value=0.0;
    hum.connect(humGain); h2.connect(humGain); humGain.connect(AC.destination);
    hum.start(); h2.start();
    humGain.gain.linearRampToValueAtTime(0.045, AC.currentTime+2.2);
  }catch(e){}
}
function blip(freq){
  if(!AC) return;
  try{
    var o=AC.createOscillator(), g=AC.createGain();
    o.type="triangle"; o.frequency.value=freq||520;
    g.gain.value=0.0001; o.connect(g); g.connect(AC.destination);
    var n=AC.currentTime;
    g.gain.exponentialRampToValueAtTime(0.12,n+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,n+0.18);
    o.start(n); o.stop(n+0.2);
  }catch(e){}
}
function charge(){
  if(!AC) return;
  try{
    var o=AC.createOscillator(), g=AC.createGain();
    o.type="sawtooth"; o.connect(g); g.connect(AC.destination);
    var n=AC.currentTime;
    o.frequency.setValueAtTime(80,n);
    o.frequency.exponentialRampToValueAtTime(880,n+0.7);
    g.gain.setValueAtTime(0.0001,n);
    g.gain.exponentialRampToValueAtTime(0.09,n+0.5);
    g.gain.exponentialRampToValueAtTime(0.0001,n+1.0);
    o.start(n); o.stop(n+1.05);
  }catch(e){}
}

/* ---------- pods ---------- */
var podHit = [];   // screen positions for tap test
function drawPods(now, reveal){
  podHit.length=0;
  var n=PODS.length;
  var orbit = R*2.05;
  var tilt = 0.42;
  var spin = now*0.00006;
  for (var i=0;i<n;i++){
    var ang = (i/n)*Math.PI*2 + spin;
    var ex = Math.cos(ang)*orbit;
    var ez = Math.sin(ang)*orbit*0.62;
    var ey = Math.sin(ang)*orbit*tilt*-0.35;
    var pr = project(ex/R, ey/R, ez/R);
    var x=pr.px, y=pr.py;
    var depth=pr.depth;
    var a = reveal * (0.4 + 0.6*((depth+1)/2));
    var col = PODS[i].live ? "63,185,80" : "240,165,0";
    // filament to core
    ctx.strokeStyle="rgba("+(PODS[i].live?"79,195,247":"240,165,0")+","+(0.10*a)+")";
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.lineTo(x,y); ctx.stroke();
    // node
    var rad = 4.5*pr.sc;
    var g=ctx.createRadialGradient(x,y,0,x,y,rad*3);
    g.addColorStop(0,"rgba("+col+","+(0.95*a)+")");
    g.addColorStop(1,"rgba("+col+",0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,rad*3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="rgba("+col+","+a+")"; ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fill();
    // label
    ctx.font="600 10px 'IBM Plex Mono', monospace";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle="rgba("+(PODS[i].live?"205,217,229":"139,152,173")+","+a+")";
    ctx.fillText(PODS[i].label, x, y - rad*3 - 9);
    if(!PODS[i].live){
      ctx.font="500 7.5px 'IBM Plex Mono', monospace";
      ctx.fillStyle="rgba(240,165,0,"+(0.7*a)+")";
      ctx.fillText("PENDING", x, y + rad*3 + 8);
    }
    podHit.push({x:x,y:y,r:Math.max(26,rad*5),pod:PODS[i]});
  }
}

/* ---------- render loop ---------- */
function frame(now){
  requestAnimationFrame(frame);
  ctx.clearRect(0,0,W,H);

  var reveal=0, mix=0, breathe=1;
  if(phase==="idle"){ return; }
  if(phase==="text"){
    var e=(now-t0)/1600; if(e>=1){e=1; phase="collapse"; t0=now;}
    mix=0; // text positions
    drawParticles(easeOut(e), 0, 1);
  } else if(phase==="collapse"){
    var e2=(now-t0)/1500; if(e2>=1){e2=1; phase="live"; t0=now; onLive();}
    mix=easeInOut(e2);
    drawParticles(1, mix, 1-0.15*mix);
  } else {
    breathe = 1 + Math.sin(now*0.0012)*0.03;
    if(!dragging){ rotY += velY; rotX += velX; velY*=0.992; velX*=0.96; if(Math.abs(velY)<0.0006) velY+=(0.0016-velY)*0.02; }
    reveal = Math.min(1,(now-t0)/1200);
    drawDust(now, reveal);
    drawParticles(1, 1, breathe);
    drawRings(now, breathe, reveal);
    drawPods(now, reveal);
  }
}

function drawParticles(textAmt, sphereAmt, scaleMul){
  // resolve current position: blend text target -> sphere home
  var arr=[];
  for (var i=0;i<N;i++){
    var p=P[i];
    var hx,hy,depth,sc;
    if(sphereAmt<=0){
      // pure text layout (flat, facing viewer)
      hx = CX + p.tx; hy = CY + p.ty; depth=0.5; sc=1;
      arr.push({x:hx,y:hy,depth:depth,sc:sc,a:0.9*textAmt});
    } else {
      var pr=project(p.sx*scaleMul, p.sy*scaleMul, p.sz*scaleMul);
      // blend from text pos to sphere pos
      var bx = (CX+p.tx)*(1-sphereAmt) + pr.px*sphereAmt;
      var by = (CY+p.ty)*(1-sphereAmt) + pr.py*sphereAmt;
      arr.push({x:bx,y:by,depth:pr.depth,sc:pr.sc,a:1});
    }
  }
  arr.sort(function(a,b){return a.depth-b.depth;});
  for (var k=0;k<arr.length;k++){
    var q=arr[k];
    var d=(q.depth+1)/2;                 // 0 back .. 1 front
    var size=(0.9+1.7*d)*q.sc;
    var alpha=(0.18+0.78*d)*q.a;
    // colour: hot core front, cyan back
    var col = d>0.78 ? "223,250,255" : "79,195,247";
    ctx.beginPath();
    ctx.fillStyle="rgba("+col+","+alpha+")";
    ctx.arc(q.x,q.y,size,0,Math.PI*2);
    ctx.fill();
  }
  // core glow
  if(sphereAmt>0){
    var gg=ctx.createRadialGradient(CX,CY,0,CX,CY,R*1.15);
    gg.addColorStop(0,"rgba(79,195,247,"+(0.16*sphereAmt)+")");
    gg.addColorStop(0.5,"rgba(79,195,247,"+(0.05*sphereAmt)+")");
    gg.addColorStop(1,"rgba(79,195,247,0)");
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(CX,CY,R*1.15,0,Math.PI*2); ctx.fill();
  }
}

function drawRings(now,breathe,reveal){
  var rings=[[0,0],[Math.PI/2.4,0.6],[Math.PI/2,Math.PI/3]];
  for (var r=0;r<rings.length;r++){
    ctx.beginPath();
    var first=true;
    for (var a=0;a<=Math.PI*2+0.1;a+=0.16){
      var cx=Math.cos(a), sz=Math.sin(a);
      // tilt each ring
      var tx=cx, ty=Math.sin(rings[r][0])*sz, tz=Math.cos(rings[r][0])*sz;
      // secondary spin
      var s=rings[r][1]+now*0.0002;
      var rx=tx*Math.cos(s)-tz*Math.sin(s), rz=tx*Math.sin(s)+tz*Math.cos(s);
      var pr=project(rx*1.16*breathe, ty*1.16*breathe, rz*1.16*breathe);
      if(first){ctx.moveTo(pr.px,pr.py);first=false;} else ctx.lineTo(pr.px,pr.py);
    }
    ctx.strokeStyle="rgba(79,195,247,"+(0.12*reveal)+")";
    ctx.lineWidth=1; ctx.stroke();
  }
}

function drawDust(now,reveal){
  for (var i=0;i<DUST.length;i++){
    var d=DUST[i]; d.a+=d.sp;
    var x=CX+Math.cos(d.a)*d.rad, y=CY+Math.sin(d.a)*d.rad*0.5;
    ctx.fillStyle="rgba(139,152,173,"+(0.10*reveal*d.z)+")";
    ctx.beginPath(); ctx.arc(x,y,d.s,0,Math.PI*2); ctx.fill();
  }
}

function easeOut(t){return 1-Math.pow(1-t,3);}
function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

/* ---------- pointer interaction ---------- */
function down(e){
  var pt=point(e);
  dragging=true; pmoved=false;
  lastX=pdownX=pt.x; lastY=pdownY=pt.y;
}
function move(e){
  if(!dragging) return;
  var pt=point(e);
  var dx=pt.x-lastX, dy=pt.y-lastY;
  if(Math.abs(pt.x-pdownX)+Math.abs(pt.y-pdownY)>6) pmoved=true;
  if(phase==="live"){
    rotY += dx*0.006; rotX += dy*0.006;
    rotX=Math.max(-1.3,Math.min(1.3,rotX));
    velY=dx*0.006; velX=dy*0.0006;
  }
  lastX=pt.x; lastY=pt.y;
}
function up(e){
  dragging=false;
  if(!pmoved && phase==="live"){ tapTest(lastX,lastY); }
}
function point(e){
  if(e.touches&&e.touches[0]) return {x:e.touches[0].clientX,y:e.touches[0].clientY};
  if(e.changedTouches&&e.changedTouches[0]) return {x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  return {x:e.clientX,y:e.clientY};
}
function tapTest(x,y){
  for (var i=0;i<podHit.length;i++){
    var h=podHit[i];
    if((x-h.x)*(x-h.x)+(y-h.y)*(y-h.y) <= h.r*h.r){
      activatePod(h.pod); return;
    }
  }
}
function activatePod(pod){
  blip(pod.live?660:300);
  speak(pod.say);
  if(pod.live && pod.go){
    setTimeout(function(){ location.href=pod.go; }, 650);
  } else {
    flash(pod.label+" — route not live yet");
  }
}

/* ---------- gyro parallax ---------- */
function enableGyro(){
  try{
    window.addEventListener("deviceorientation",function(ev){
      if(ev.gamma==null) return;
      gyroY = (ev.gamma/90)*0.25;
      gyroX = (ev.beta/180)*0.25;
    },true);
  }catch(e){}
}

/* ---------- HUD / clock / greeting ---------- */
function tickClock(){
  var d=new Date();
  var hh=d.getHours(), mm=d.getMinutes();
  var ap=hh>=12?"PM":"AM"; var h12=hh%12; if(h12===0)h12=12;
  document.getElementById("t-time").textContent=h12+":"+(mm<10?"0":"")+mm+" "+ap;
  document.getElementById("t-date").textContent=d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
}
function greetingText(){
  var h=new Date().getHours();
  var part = h<12?"Good morning":h<18?"Good afternoon":"Good evening";
  return part+", Dennis. All systems online.";
}

/* ---------- voice loop -> JARVIS ---------- */
var SR = window.SpeechRecognition||window.webkitSpeechRecognition;
var rec=null, listening=false, busy=false;
var micEl=document.getElementById("mic");
var hintEl=document.getElementById("michint");
var transEl=document.getElementById("transcript");
var pinWrap=document.getElementById("pinwrap");
var pinInput=document.getElementById("pin");

function setTrans(html){ transEl.innerHTML=html; }
function flash(msg){ setTrans('<span class="jarvis">'+esc(msg)+'</span>'); }
function esc(s){return String(s).replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}

micEl.addEventListener("click", function(){
  if(busy) return;
  if(!PIN){ // need a pin first
    pinWrap.classList.add("show");
    pinInput.focus();
    return;
  }
  if(listening){ stopListen(); return; }
  startListen();
});
pinInput.addEventListener("keydown",function(e){ if(e.key==="Enter") commitPin(); });
pinInput.addEventListener("input",function(){ if(pinInput.value.length>=4 && pinInput.value.length<=10){} });
function commitPin(){
  var v=pinInput.value.trim();
  if(!v) return;
  PIN=v; pinWrap.classList.remove("show");
  blip(720); startListen();
}

function startListen(){
  if(!SR){ flash("Voice input isn't supported in this browser. Try Chrome."); return; }
  try{
    rec=new SR(); rec.lang="en-US"; rec.interimResults=true; rec.maxAlternatives=1;
    var finalT="";
    rec.onstart=function(){ listening=true; micEl.classList.add("listening"); hintEl.textContent="listening…"; setTrans('<span class="you">…</span>'); };
    rec.onresult=function(e){
      var interim="";
      for(var i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) finalT+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      setTrans('<span class="you">'+esc(finalT||interim)+'</span>');
    };
    rec.onerror=function(){ stopListen(); };
    rec.onend=function(){
      micEl.classList.remove("listening"); listening=false; hintEl.textContent="tap to speak";
      var q=finalT.trim();
      if(q) askJarvis(q);
    };
    rec.start();
  }catch(e){ flash("Couldn't start the mic."); }
}
function stopListen(){ try{ if(rec) rec.stop(); }catch(e){} }

function askJarvis(q){
  busy=true; micEl.classList.add("busy"); hintEl.textContent="thinking…";
  setTrans('<span class="you">'+esc(q)+'</span><br><span class="jarvis">·····</span>');
  fetch(JARVIS_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ pin:PIN, message:q, session:SESSION })
  }).then(function(r){return r.json();}).then(function(j){
    var reply = (j && j.reply) ? j.reply : "No reply.";
    if(j && j.locked){
      PIN=""; pinWrap.classList.add("show");
      setTrans('<span class="jarvis">'+esc(reply)+'</span>');
    } else {
      setTrans('<span class="you">'+esc(q)+'</span><br><span class="jarvis">'+esc(reply)+'</span>');
      speak(reply);
    }
  }).catch(function(){
    setTrans('<span class="jarvis">Connection to JARVIS failed.</span>');
  }).then(function(){
    busy=false; micEl.classList.remove("busy"); hintEl.textContent="tap to speak";
  });
}

/* ---------- speech synthesis ---------- */
var voicesReady=false;
function warmVoices(){ try{ if(window.speechSynthesis){ speechSynthesis.getVoices(); voicesReady=true; } }catch(e){} }
function speak(text){
  try{
    if(!window.speechSynthesis) return;
    var u=new SpeechSynthesisUtterance(text.replace(/[•·\u{1F300}-\u{1FAFF}]/gu,""));
    u.rate=1.02; u.pitch=0.92;
    var vs=speechSynthesis.getVoices();
    var pick=vs.find(function(v){return /Google US English|Daniel|Microsoft (Guy|David)/i.test(v.name);});
    if(pick) u.voice=pick;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- lifecycle ---------- */
function onLive(){
  document.getElementById("hud").classList.add("show");
  document.getElementById("console").classList.add("show");
  var g=document.getElementById("greet");
  g.innerHTML="";
  // show greeting as text only — no voice until the user initiates (tap a pod or the mic)
  var txt=greetingText();
  g.innerHTML="<b>"+esc(txt)+"</b>";
  enableGyro();
}

var gate=document.getElementById("gate");
function initGo(){
  audioInit();
  warmVoices();
  gate.classList.add("hide");
  startSequence();
}
gate.addEventListener("click", initGo);

/* boot — ORDER MATTERS: resize() before any sampling/getImageData (v3 init bug) */
function boot(){
  resize();
  buildSphere();
  buildTextTargets();
  buildDust();
  requestAnimationFrame(frame);
  tickClock(); setInterval(tickClock,1000);
}
window.addEventListener("resize", function(){ resize(); buildTextTargets(); buildDust(); });
if(window.speechSynthesis) speechSynthesis.onvoiceschanged=warmVoices;

// pointer/touch bindings
cv.addEventListener("mousedown",down); window.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
cv.addEventListener("touchstart",function(e){down(e);},{passive:true});
window.addEventListener("touchmove",function(e){move(e);},{passive:true});
window.addEventListener("touchend",up);

boot();
</script>
