<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Brain">
  <meta name="theme-color" content="#000000">
  <title>DENMOW Brain</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #pin-gate { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
    #pin-gate.hidden { display: none; }
    .pin-box { border: 2px solid #00FFFF; box-shadow: 0 0 20px #00FFFF, inset 0 0 20px rgba(0,255,255,0.04); padding: 40px 50px; text-align: center; min-width: 280px; }
    .pin-title { color: #00FFFF; font-size: 2rem; font-weight: bold; letter-spacing: 0.3em; text-shadow: 0 0 12px #00FFFF; }
    .pin-sub { color: #00FFFF66; font-size: 0.75rem; letter-spacing: 0.2em; margin-top: 6px; }
    .pin-dots { display: flex; justify-content: center; gap: 14px; margin: 28px 0 24px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #00FFFF66; background: transparent; transition: background 0.15s, border-color 0.15s; }
    .pin-dot.filled { background: #00FFFF; border-color: #00FFFF; box-shadow: 0 0 8px #00FFFF; }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 4px; }
    .pin-btn { background: transparent; border: 1px solid #00FFFF44; color: #00FFFF; font-family: 'Courier New', monospace; font-size: 1.3rem; font-weight: bold; padding: 14px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; border-radius: 4px; }
    .pin-btn:hover, .pin-btn:active { border-color: #00FFFF; box-shadow: 0 0 10px #00FFFF55; color: #fff; }
    .pin-btn.del { color: #FF003C99; border-color: #FF003C33; font-size: 1rem; }
    .pin-btn.del:hover { border-color: #FF003C; box-shadow: 0 0 10px #FF003C55; color: #FF003C; }
    .pin-error { color: #FF003C; font-size: 0.78rem; letter-spacing: 0.15em; margin-top: 14px; min-height: 1.2em; text-shadow: 0 0 8px #FF003C; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
    .shake { animation: shake 0.4s ease; }
    #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.4s ease; }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .splash-border { border: 2px solid #00FFFF; box-shadow: 0 0 16px #00FFFF, inset 0 0 16px rgba(0,255,255,0.05); padding: 40px 60px; text-align: center; }
    .splash-title { color: #00FFFF; font-size: 2.4rem; font-weight: bold; letter-spacing: 0.3em; text-shadow: 0 0 12px #00FFFF; }
    .splash-sub { color: #00FFFF99; font-size: 0.85rem; letter-spacing: 0.2em; margin-top: 8px; }
    .splash-dot { display: inline-block; animation: pulse 1s infinite; color: #00FFFF; font-size: 1.5rem; margin-top: 24px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    #frame { width: 100%; height: 100%; border: none; display: block; background: #000; }
    #offline { display: none; position: fixed; inset: 0; background: #000; color: #00FFFF; font-family: 'Courier New', monospace; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; }
    #offline.show { display: flex; }
    .offline-box { border: 2px solid #FF003C; box-shadow: 0 0 16px #FF003C; padding: 32px 48px; }
    .offline-title { color: #FF003C; font-size: 1.4rem; letter-spacing: 0.2em; text-shadow: 0 0 10px #FF003C; }
    .offline-msg { color: #FF003C99; font-size: 0.8rem; margin-top: 10px; }
    .retry-btn { margin-top: 20px; padding: 10px 28px; background: transparent; border: 2px solid #00FFFF; color: #00FFFF; font-family: 'Courier New', monospace; font-size: 0.9rem; letter-spacing: 0.15em; cursor: pointer; box-shadow: 0 0 10px #00FFFF55; transition: box-shadow 0.2s; }
    .retry-btn:hover { box-shadow: 0 0 20px #00FFFF; }
  </style>
</head>
<body>
  <div id="pin-gate">
    <div class="pin-box" id="pin-box">
      <div class="pin-title">BRAIN</div>
      <div class="pin-sub">DENMOW · KNOWLEDGE HUB</div>
      <div class="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn del" onclick="pinDel()">&#9003;</button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn" style="visibility:hidden"></button>
      </div>
      <div class="pin-error" id="pin-error"></div>
    </div>
  </div>
  <div id="splash" class="hidden">
    <div class="splash-border">
      <div class="splash-title">BRAIN</div>
      <div class="splash-sub">DENMOW · KNOWLEDGE HUB</div>
      <div class="splash-dot">&#9679;</div>
    </div>
  </div>
  <div id="offline">
    <div class="offline-box">
      <div class="offline-title">&#9889; OFFLINE</div>
      <div class="offline-msg">Cannot reach Brain server.<br>Check network or VPN.</div>
      <button class="retry-btn" onclick="loadFrame()">RETRY</button>
    </div>
  </div>
  <iframe id="frame" title="DENMOW Brain"></iframe>
  <script>
    const BRAIN_URL = 'https://wcaasitteam.duckdns.org/webhook/brain-intake';
    const CORRECT   = '1268';
    const STORE_KEY = 'brain_unlocked';
    const pinGate = document.getElementById('pin-gate');
    const splash  = document.getElementById('splash');
    const offline = document.getElementById('offline');
    const frame   = document.getElementById('frame');
    const pinErr  = document.getElementById('pin-error');
    const pinBox  = document.getElementById('pin-box');
    let entered = '';
    function updateDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById('d' + i).classList.toggle('filled', i < entered.length);
      }
    }
    function pinPress(digit) {
      if (entered.length >= 4) return;
      entered += digit;
      updateDots();
      if (entered.length === 4) checkPin();
    }
    function pinDel() {
      entered = entered.slice(0, -1);
      pinErr.textContent = '';
      updateDots();
    }
    function checkPin() {
      if (entered === CORRECT) {
        localStorage.setItem(STORE_KEY, '1');
        pinGate.classList.add('hidden');
        boot();
      } else {
        pinErr.textContent = 'INVALID PIN';
        pinBox.classList.add('shake');
        setTimeout(() => { pinBox.classList.remove('shake'); entered = ''; updateDots(); pinErr.textContent = ''; }, 500);
      }
    }
    function showOffline() { splash.classList.add('hidden'); offline.classList.add('show'); }
    function loadFrame() {
      offline.classList.remove('show');
      splash.classList.remove('hidden');
      frame.onload = () => setTimeout(() => splash.classList.add('hidden'), 300);
      frame.onerror = showOffline;
      frame.src = BRAIN_URL + '?t=' + Date.now();
    }
    function boot() {
      splash.classList.remove('hidden');
      loadFrame();
      setTimeout(() => { if (!splash.classList.contains('hidden')) showOffline(); }, 10000);
    }
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(console.warn);
    if (localStorage.getItem(STORE_KEY) === '1') { pinGate.classList.add('hidden'); boot(); } 
  </script>
</body>
</html>
